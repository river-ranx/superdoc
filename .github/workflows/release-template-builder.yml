# Auto-releases on push to main (@next).
# Stable releases are orchestrated centrally by release-stable.yml.
name: 📦 Release template-builder

on:
  push:
    branches:
      - main
    paths:
      - 'packages/template-builder/**'
      - 'packages/superdoc/**'
      - 'packages/layout-engine/**'
      - 'packages/super-editor/**'
      - 'packages/ai/**'
      - 'packages/word-layout/**'
      - 'packages/preset-geometry/**'
      - 'shared/**'
      - 'pnpm-workspace.yaml'
      - '!**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.ref_name == 'stable' && 'release-stable' || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.ref_name != 'stable' }}

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Refresh stable branch head
        if: github.ref_name == 'stable'
        run: |
          git fetch origin "${{ github.ref_name }}" --tags
          git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          LINEAR_TOKEN: ${{ secrets.LINEAR_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: packages/template-builder
        run: pnpx semantic-release
