<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperDoc + Hocuspocus</title>
    <style>
      :root {
        --app-bg: var(--sd-color-bg-subtle, #f6f7f9);
        --surface: var(--sd-color-bg, #ffffff);
        --border: var(--sd-color-border, #d8dee6);
        --text: var(--sd-color-text, #17202a);
        --muted: var(--sd-color-text-muted, #637083);
        --primary: var(--sd-color-primary, #1355ff);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--app-bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button {
        min-height: 32px;
        border: 1px solid var(--primary);
        border-radius: 4px;
        padding: 0 12px;
        background: var(--primary);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .toolbar {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .toolbar h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 650;
      }

      .toolbar p {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      main {
        flex: 1;
        min-height: 0;
      }

      .superdoc-container {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
